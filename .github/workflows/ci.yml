name: CI

# Proves the pipeline works on every push/PR without committing any outputs:
#   - pytest: the samplesheet validator's unit tests
#   - nextflow-stub: runs the WHOLE DAG in stub mode (no tools, no network),
#     confirming every stage is wired and produces its expected outputs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Unit tests (samplesheet validator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest -q

  nextflow-stub:
    name: Pipeline stub run (all stages, offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: nf-core/setup-nextflow@v2
      - name: Run the full DAG in stub mode
        run: nextflow run main.nf -profile test -stub -ansi-log false
      - name: Confirm every stage published its outputs
        run: |
          set -e
          test -f results/pipeline_info/samplesheet.valid.csv          # M1 input
          test -f results/qc/fastqc/sample1_R1_fastqc.html             # M1 QC
          test -f results/preprocessing/fastp/sample1/sample1_1.fastp.fastq.gz
          test -f results/alignment/sample1/sample1.recal.bam          # M2 align
          test -f results/qc/alignment/sample1/sample1.flagstat        # M2 QC
          test -f results/variants/sample1/sample1.filtered.vcf.gz     # M3 call
          test -f results/annotation/sample1/sample1.snpeff.vcf.gz     # M4 annotate
          test -f results/report/sample1/sample1.prioritized.json      # M5 prioritize
          test -f results/report/sample1/sample1.report.html           # M6 report
          test -f results/report/sample1/sample1.fhir.json
          test -f results/multiqc/multiqc_report.html                  # aggregate
          echo "All stages (M1-M6) produced their expected outputs."
